version: '3.8'

services:
  frontend:
    image: nginx:alpine
    container_name: simpeg_frontend
    ports:
      - "8080:80"
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    networks:
      - simpeg_network

networks:
  simpeg_network:
    external: true
    name: simpeg_network
