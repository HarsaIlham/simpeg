server {
    listen 80;
    server_name localhost;

    # 1. Frontend Static Files (Vite Build)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests to backend
    location /api/ {
        # Menggunakan resolver Docker jika di dalam network Docker, atau pass langsung ke service backend
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Proxy Dokumen/File Upload ke backend
    location /dokumen/ {
        proxy_pass http://backend:8000/dokumen/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Mencegah download paksa agar file bisa di-preview di browser
        proxy_hide_header Content-Disposition;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
